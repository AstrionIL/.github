<text x="800" y="490" text-anchor="middle" xml:space="preserve" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9d1d9">‏יציבות וביצועים • תחזוקה ושיפור מתמיד • חוויית משחק הוגנת‏</text>
<text x="800" y="520" text-anchor="middle" xml:space="preserve" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9d1d9">‏קהילה לפני הכול • שיח מכבד • צוות פעיל ותומך‏</text>
