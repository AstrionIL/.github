<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-label="AstrionIL - Core Systems Development">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1552" height="312" rx="26" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="54" y="64" width="12" height="232" rx="6" fill="url(#accent)"/>

  <!-- Brand -->
  <text x="92" y="132" font-family="Arial, Helvetica, sans-serif" font-size="64" fill="#e6edf3" font-weight="800">AstrionIL</text>

  <!-- Tagline -->
  <text x="92" y="182" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#c9d1d9">
    Israeli Minecraft community server
  </text>
  <text x="92" y="212" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#8b949e">
    Custom systems • Continuous development • Community-first experience
  </text>

  <!-- Stage pill -->
  <rect x="92" y="242" width="860" height="56" rx="28" fill="#a371f7" opacity="0.16"/>
  <text x="118" y="278" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#e6edf3" font-weight="800">
    Stage: Core Systems Development
  </text>

  <!-- Server info -->
  <text x="1040" y="252" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#e6edf3">
    Server: Astrion-IL.Net
  </text>
  <text x="1040" y="280" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#8b949e">
    Discord: discord.astrion-il.net
  </text>

  <!-- Footer microtext -->
  <text x="92" y="318" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e">
    © AstrionIL Community
  </text>
</svg>
