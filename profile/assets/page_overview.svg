<text x="800" y="280" text-anchor="middle" xml:space="preserve" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9d1d9">‏AstrionIL הוא שרת ‎Minecraft‎ ישראלי עם דגש על קהילה פעילה וחוויית משחק יציבה.‏</text>
<text x="800" y="310" text-anchor="middle" xml:space="preserve" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9d1d9">‏הפרויקט מתמקד במערכות מותאמות (‎Custom Systems‎), עדכונים שוטפים ותוכן מתפתח.‏</text>
<text x="800" y="340" text-anchor="middle" xml:space="preserve" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9d1d9">‏המטרה: שרת איכותי לאורך זמן עם אירועים קהילתיים, שיתוף פעולה ויצירתיות.‏</text>
