<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-label="AstrionIL - קהילת מיינקראפט ישראלית">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
